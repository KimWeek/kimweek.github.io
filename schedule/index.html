<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김위크 | 김위크의 공방</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #0a0a0a;
      --bg-bottom: #1a1a1a;
      --ink: #f5f5f5;
      --muted: #b9b9b9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
      padding: 80px 24px 120px;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: -0.02em;
      animation: rise 0.9s ease forwards;
      opacity: 0;
    }

    .project-card {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      animation: fadeIn 0.9s ease forwards;
      opacity: 0;
    }

    .project-card:nth-of-type(1) { animation-delay: 0.2s; }
    .project-card:nth-of-type(2) { animation-delay: 0.3s; }
    .project-card:nth-of-type(3) { animation-delay: 0.4s; }

    .project-card summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      display: grid;
      gap: 6px;
    }

    .project-card summary::-webkit-details-marker {
      display: none;
    }

    .project-card summary::after {
      content: "+";
      position: absolute;
      right: 18px;
      top: 16px;
      font-size: 18px;
      color: var(--muted);
    }

    .project-card summary {
      position: relative;
    }

    .project-card[open] summary::after {
      content: "–";
    }

    .project-card .content {
      padding: 0 18px 18px;
      display: grid;
      gap: 14px;
      display: grid;
      gap: 14px;
    }

    details:not([open]) .content {
      display: none;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02));
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .meta {
      display: grid;
      gap: 8px;
    }

    .name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .period {
      font-size: 13px;
      color: var(--muted);
    }


    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      width: fit-content;
      animation: fadeIn 0.9s ease forwards;
      opacity: 0;
      animation-delay: 0.55s;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-top: #ffffff;
        --bg-bottom: #e9e9e9;
        --ink: #0a0a0a;
        --muted: #4b4b4b;
      }

      .project-card {
        border-color: rgba(0, 0, 0, 0.16);
        background: rgba(0, 0, 0, 0.03);
      }

      .thumb {
        border-color: rgba(0, 0, 0, 0.16);
        background: linear-gradient(135deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.02));
      }


      a {
        border-bottom-color: rgba(0, 0, 0, 0.35);
      }
    }

    @keyframes rise {
      from {
        transform: translateY(16px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>김위크의 공방 일정</h1>
    <details class="project-card">
      <summary>
        <div class="name">프로젝트 이름 1</div>
        <div class="period">2026.03.01 ~ 2026.06.30</div>
      </summary>
      <div class="content">
        <div class="thumb">16:9 이미지 자리</div>
        <div class="meta">
          <p class="desc">설명 설명 설명</p>
        </div>
      </div>
    </details>
    <details class="project-card">
      <summary>
        <div class="name">프로젝트 이름 2</div>
        <div class="period">2026.07.01 ~ 2026.09.30</div>
      </summary>
      <div class="content">
        <div class="thumb">16:9 이미지 자리</div>
        <div class="meta">
          <p class="desc">설명 설명 설명</p>
        </div>
      </div>
    </details>
    <details class="project-card">
      <summary>
        <div class="name">프로젝트 이름 3</div>
        <div class="period">2026.10.01 ~ 2026.12.31</div>
      </summary>
      <div class="content">
        <div class="thumb">16:9 이미지 자리</div>
        <div class="meta">
          <p class="desc">설명 설명 설명</p>
        </div>
      </div>
    </details>
    <a href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
