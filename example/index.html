<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KimWeek | Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #0a0a0a;
      --bg-bottom: #1a1a1a;
      --ink: #f5f5f5;
      --muted: #b9b9b9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      text-align: center;
      padding: 32px 28px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      max-width: 420px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-top: #ffffff;
        --bg-bottom: #e9e9e9;
        --ink: #0a0a0a;
        --muted: #4b4b4b;
      }

      .card {
        border-color: rgba(0, 0, 0, 0.18);
        background: rgba(0, 0, 0, 0.03);
      }

      a {
        border-bottom-color: rgba(0, 0, 0, 0.35);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Example</h1>
    <p>이 페이지는 /example 경로 테스트용입니다.</p>
    <a href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
